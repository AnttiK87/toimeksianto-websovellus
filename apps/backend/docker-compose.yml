services:
  mysql:
    image: mysql:latest
    container_name: mysql_container
    restart: always
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_container
    restart: always
    ports:
      - '8080:8080'

volumes:
  mysql_data:
